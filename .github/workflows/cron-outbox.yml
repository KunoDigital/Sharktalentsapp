name: Cron — Process Outbox

# Procesa la cola del outbox (eventos pending → consumers como email, Recruit sync).
#
# Setup:
#   Repository → Settings → Secrets and variables → Actions → New secret
#   - CATALYST_API_URL  (ej: https://abc-xyz.catalystserverless.com/server/api)
#   - INTERNAL_API_KEY  (de scripts/generate-secret.sh)
#
# Frecuencia: cada 5 minutos.
#
# Alternativa: Catalyst Console → Cron Service (ver docs/RUNBOOKS/cron-setup.md).
#              Si configurás ambos, vas a procesar el doble — elegí UNO.

on:
  schedule:
    - cron: '*/5 * * * *'  # cada 5 minutos
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Tamaño del batch (default 50)'
        required: false
        default: '50'

jobs:
  process-outbox:
    name: Process pending outbox events
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets present
        env:
          CATALYST_API_URL: ${{ secrets.CATALYST_API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          if [ -z "$CATALYST_API_URL" ] || [ -z "$INTERNAL_API_KEY" ]; then
            echo "::warning::Secrets CATALYST_API_URL e INTERNAL_API_KEY no configurados — skip"
            exit 0
          fi

      - name: Process outbox batch
        env:
          CATALYST_API_URL: ${{ secrets.CATALYST_API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          OUTBOX_BATCH_SIZE: ${{ github.event.inputs.batch_size || '50' }}
        run: |
          if [ -z "$CATALYST_API_URL" ] || [ -z "$INTERNAL_API_KEY" ]; then
            echo "Skipping (no secrets configured)"
            exit 0
          fi
          chmod +x scripts/cron-process-outbox.sh
          scripts/cron-process-outbox.sh
